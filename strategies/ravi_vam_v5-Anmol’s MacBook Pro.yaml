# IFA Strategy DSL — Ravi VAM v5 (Leveraged)
# Client: Ravi Mareedu & Sudhir Vyakaranam
# Strategy: Adaptive Regime Rotation with Volatility Guard
# Backtest: 2020-01-02 to 2025-12-30 (DataBento real data)
# Results: -33.33% total return, CAGR -6.5%, Sharpe -0.10, MaxDD -45.8%

strategy:
  name: "Ravi_VAM_v5_AdaptiveRegime"
  version: "5"
  description: >
    Leveraged ETF rotation strategy with adaptive regime detection.
    Uses trend (SMA crossover), momentum (RSI), and volatility (ATR%) signals to classify
    market into 5 states. Includes drawdown circuit breaker at 15.0% and
    volatility guard that eliminates leverage when ATR% exceeds threshold.
    Uses UPRO/TQQQ in aggressive state only when all 3 signals align.

  universe:
    market: US
    instruments: ['GLD', 'SHY', 'TQQQ', 'UPRO']
    signal_source: "SPY"
    timeframe: 1d
    backtest_start: "2020-01-02"
    backtest_end: "2025-12-30"
    data_source: "DataBento XNAS.ITCH"

  indicators:
    - name: sma_short
      type: SMA
      params:
        period: 50
      applied_to: SPY

    - name: sma_long
      type: SMA
      params:
        period: 200
      applied_to: SPY

    - name: rsi
      type: RSI
      params:
        period: 14
      applied_to: SPY

    - name: atr
      type: ATR
      params:
        period: 14
      applied_to: SPY
      derived: atr_pct = atr / close * 100

  regime_states:
    - name: AGGRESSIVE
      allocation: {UPRO: 60, TQQQ: 40}
    - name: DEFENSIVE
      allocation: {SHY: 60, GLD: 40}
    - name: CRASH_PROTECT
      allocation: {SHY: 100}

  guards:
    volatility_guard:
      metric: atr_pct
      threshold: 2.0
      action: "Downgrade AGGRESSIVE to MODERATE when ATR% > threshold"

    drawdown_circuit_breaker:
      trigger_pct: 15.0
      lookback_days: 60
      cooldown_days: 20
      action: "Force CRASH_PROTECT state for cooldown period after trailing DD breach"

  costs:
    commission_pct: 0.10
    slippage_pct: 0.05

  results:
    total_return_pct: -33.33
    annual_return_pct: -6.54
    sharpe_ratio: -0.0988
    max_drawdown_pct: -45.81
    win_rate_pct: 49.8
    profit_factor: 0.9742
    trade_count: 27
    calmar_ratio: -0.1428
    annualized_volatility_pct: 27.84

  metadata:
    author: "Insight Fusion Analytics"
    client: "Ravi Mareedu & Sudhir Vyakaranam"
    created: "2026-03-20"
    qualification_status: "FAIL"
    qualification_score: "2/10"
    tags:
      - adaptive-regime
      - volatility-guard
      - drawdown-circuit-breaker
      - leveraged-ETF
      - rotation
      - 5-state-engine
      - client-ravi
