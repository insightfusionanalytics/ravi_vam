# IFA Strategy DSL — Ravi VAM v3 (Optimized)
# Client: Ravi Mareedu & Sudhir Vyakaranam
# Strategy: Value + Alpha + Momentum leveraged ETF rotation
# Backtest: 2010-01-01 to 2024-12-31
# Results: +1,097% total return, CAGR 17.7%, Sharpe 0.68, MaxDD -44.1%
#
# Architecture: 7-state rotation engine
#   BULL_FULL   → 75% UPRO + 25% TQQQ (golden cross + RSI > 40)
#   BULL_CAUTION → 50% UPRO + 50% SHY  (golden cross + RSI 30-40)
#   NEUTRAL     → 100% SHY             (SMA50 ~ SMA200, no clear trend)
#   BEAR_HEDGE  → 100% SHY             (death cross)
#   RECOVERY    → 25% UPRO + 75% SHY   (death cross reversing, RSI rising)
#   MOMENTUM    → 100% UPRO            (strong bull, RSI > 65)
#   CRASH       → 100% cash            (RSI < 20, circuit breaker)
#
# This DSL represents the primary BULL_FULL state (generates most returns).
# The full 7-state logic is implemented in the hand-coded backtest engine.

strategy:
  name: "Ravi_VAM_v3_Optimized"
  version: 3
  description: >
    Leveraged ETF momentum rotation strategy. Rotates between UPRO (3x S&P 500),
    TQQQ (3x Nasdaq-100), and SHY (short-term treasury) based on SPY trend regime
    and momentum signals. Primary allocation: 75% UPRO, 25% TQQQ in bull regime.
    Exits to 100% SHY on death cross. RSI(14) > 40 confirmation prevents whipsaw
    entries. 7-state engine handles transition zones.

  universe:
    market: US
    instruments: ["UPRO", "TQQQ", "SHY"]
    signal_source: "SPY"
    timeframe: 1d
    backtest_start: "2010-01-01"
    backtest_end: "2024-12-31"

  indicators:
    - name: sma_50
      type: SMA
      params:
        period: 50
      applied_to: SPY

    - name: sma_200
      type: SMA
      params:
        period: 200
      applied_to: SPY

    - name: rsi_14
      type: RSI
      params:
        period: 14
      applied_to: SPY

    - name: atr_14
      type: ATR
      params:
        period: 14
      applied_to: SPY

  entry:
    long:
      conditions:
        - "sma_50 > sma_200"                # Golden cross: bullish regime
        - "sma_50[-1] <= sma_200[-1]"        # Crossover just happened (entry trigger)
        - "rsi_14 > 40"                      # Momentum confirmation (looser than v2's >50)
      logic: AND
      allocation:
        UPRO: 75
        TQQQ: 25

  exit:
    signal_based:
      conditions:
        - "sma_50 < sma_200"                # Death cross: exit to defensive
      logic: AND
      exit_to:
        SHY: 100

    stop_loss:
      type: percentage
      params:
        pct: 15.0                            # Wide stop for leveraged ETF volatility
      notes: "15% stop accounts for 3x leverage. Equivalent to ~5% move in underlying S&P 500."

    take_profit:
      type: percentage
      params:
        pct: 50.0                            # Capture large bull runs
      notes: "50% take-profit on individual positions. Resets on next entry signal."

    time_based:
      max_holding_bars: 252                  # 1 trading year max hold
      notes: "Force re-evaluation after 1 year even if no exit signal fires."

  position_sizing:
    method: fixed_pct
    params:
      pct_of_capital: 100                    # Fully invested in bull regime (split between UPRO/TQQQ)
    notes: "75/25 split between UPRO and TQQQ. No cash drag in bull regime."

  risk:
    max_drawdown_pct: 45                     # Strategy-level circuit breaker
    max_daily_loss_pct: 8                    # Single-day loss limit (leveraged ETFs can move 8%+ in a day)
    max_consecutive_losses: 3                # After 3 consecutive losses, reduce position size by 50%
    notes: "Risk limits are wider than typical strategies due to leveraged ETF volatility."

  regime_states:
    - name: BULL_FULL
      condition: "sma_50 > sma_200 AND rsi_14 > 40"
      allocation: {UPRO: 75, TQQQ: 25}

    - name: BULL_CAUTION
      condition: "sma_50 > sma_200 AND rsi_14 >= 30 AND rsi_14 <= 40"
      allocation: {UPRO: 50, SHY: 50}

    - name: MOMENTUM
      condition: "sma_50 > sma_200 AND rsi_14 > 65"
      allocation: {UPRO: 100}

    - name: NEUTRAL
      condition: "abs(sma_50 - sma_200) / sma_200 < 0.005"
      allocation: {SHY: 100}

    - name: RECOVERY
      condition: "sma_50 < sma_200 AND rsi_14 > 50 AND rsi_14[-5] < 30"
      allocation: {UPRO: 25, SHY: 75}

    - name: BEAR_HEDGE
      condition: "sma_50 < sma_200"
      allocation: {SHY: 100}

    - name: CRASH
      condition: "rsi_14 < 20"
      allocation: {CASH: 100}

  filters: []

  costs:
    commission_pct: 0.10
    slippage_pct: 0.05

  results:
    total_return_pct: 1097.0
    annual_return_pct: 17.7
    sharpe_ratio: 0.68
    max_drawdown_pct: -44.1
    win_rate_pct: 79.0
    profit_factor: 2.10
    trade_count: 128
    calmar_ratio: 0.40
    annualized_volatility_pct: 28.0

  metadata:
    author: "Insight Fusion Analytics"
    client: "Ravi Mareedu & Sudhir Vyakaranam"
    created: "2026-03-20"
    qualification_status: "NOT_QUALIFIED"
    qualification_notes: "Walk-forward, Monte Carlo, regime analysis pending."
    tags:
      - momentum
      - leveraged-ETF
      - SMA-crossover
      - long-only
      - rotation
      - 7-state-engine
      - client-ravi
    description: >
      Ravi's VAM v3 optimized growth engine. 7-state rotation system using SPY
      SMA(50)/SMA(200) regime detection with RSI(14) momentum confirmation.
      Primary instruments: UPRO (75%) and TQQQ (25%) in bull regime, SHY (100%)
      in bear regime. Produced 1,097% return over 15 years of backtesting with
      realistic transaction costs. Not yet fully qualified — pending statistical
      validation through IFA's 53-point qualification pipeline.
