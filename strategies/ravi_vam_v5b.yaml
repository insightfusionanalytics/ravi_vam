# IFA Strategy DSL — Ravi VAM v5b (Non-Leveraged)
# Client: Ravi Mareedu & Sudhir Vyakaranam
# Strategy: Adaptive Regime Rotation with Volatility Guard
# Backtest: 2020-01-02 to 2025-12-30 (DataBento real data)
# Results: +70.21% total return, CAGR 9.3%, Sharpe 0.74, MaxDD -25.3%

strategy:
  name: "Ravi_VAM_v5b_AdaptiveRegime"
  version: "5b"
  description: >
    Non-leveraged ETF rotation strategy with adaptive regime detection.
    Uses trend (SMA crossover), momentum (RSI), and volatility (ATR%) signals to classify
    market into 5 states. Includes drawdown circuit breaker at 15.0% and
    volatility guard that eliminates leverage when ATR% exceeds threshold.
    Uses SPY/QQQ — no leveraged ETFs.

  universe:
    market: US
    instruments: ['GLD', 'QQQ', 'SHY', 'SPY']
    signal_source: "SPY"
    timeframe: 1d
    backtest_start: "2020-01-02"
    backtest_end: "2025-12-30"
    data_source: "DataBento XNAS.ITCH"

  indicators:
    - name: sma_short
      type: SMA
      params:
        period: 50
      applied_to: SPY

    - name: sma_long
      type: SMA
      params:
        period: 200
      applied_to: SPY

    - name: rsi
      type: RSI
      params:
        period: 14
      applied_to: SPY

    - name: atr
      type: ATR
      params:
        period: 14
      applied_to: SPY
      derived: atr_pct = atr / close * 100

  regime_states:
    - name: AGGRESSIVE
      allocation: {SPY: 60, QQQ: 40}
    - name: DEFENSIVE
      allocation: {SHY: 60, GLD: 40}
    - name: CRASH_PROTECT
      allocation: {SHY: 60, GLD: 40}

  guards:
    volatility_guard:
      metric: atr_pct
      threshold: 2.0
      action: "Downgrade AGGRESSIVE to MODERATE when ATR% > threshold"

    drawdown_circuit_breaker:
      trigger_pct: 15.0
      lookback_days: 60
      cooldown_days: 20
      action: "Force CRASH_PROTECT state for cooldown period after trailing DD breach"

  costs:
    commission_pct: 0.10
    slippage_pct: 0.05

  results:
    total_return_pct: 70.21
    annual_return_pct: 9.28
    sharpe_ratio: 0.7367
    max_drawdown_pct: -25.27
    win_rate_pct: 54.52
    profit_factor: 1.145
    trade_count: 5
    calmar_ratio: 0.3672
    annualized_volatility_pct: 13.28

  metadata:
    author: "Insight Fusion Analytics"
    client: "Ravi Mareedu & Sudhir Vyakaranam"
    created: "2026-03-20"
    qualification_status: "FAIL"
    qualification_score: "6/10"
    tags:
      - adaptive-regime
      - volatility-guard
      - drawdown-circuit-breaker
      - non-leveraged
      - rotation
      - 5-state-engine
      - client-ravi
